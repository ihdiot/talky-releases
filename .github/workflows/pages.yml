# Deploys docs/ to GitHub Pages via Actions. Replaces the legacy Jekyll builder,
# which wedged/errored on 2026-07-03 with a contentless "Page build failed."
name: Deploy site to Pages

on:
  push:
    branches: [master]
    paths: ['docs/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
